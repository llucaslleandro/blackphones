<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Produtos - Carrinho & WhatsApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1d4ed8',
            secondary: '#f59e0b'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-100 text-slate-800">
  <div class="min-h-screen">
    <header class="bg-white border-b border-slate-200 shadow-sm">
      <div class="mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between gap-4">
        <div>
          <h1 id="store-name" class="text-2xl font-bold text-primary">Loja Exemplo</h1>
          <p class="text-sm text-slate-600">Catálogo online com carrinho e envio por WhatsApp.</p>
        </div>
        <button id="btn-open-cart" class="relative p-2 bg-primary text-white rounded-lg hover:bg-blue-700 transition">
          🛒
          <span id="cart-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">0</span>
        </button>
      </div>
    </header>

    <main class="mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <section class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4 mb-6">
        <div class="col-span-full flex flex-col sm:flex-row gap-3 items-stretch">
          <input id="search-input" type="search" placeholder="Buscar produto por nome..." class="flex-1 border border-slate-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary" />
          <select id="category-select" class="border border-slate-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
            <option value="all">Todas as categorias</option>
          </select>
        </div>
      </section>

      <div id="loading" class="p-6 bg-white rounded-xl shadow text-center text-slate-500">Carregando produtos...</div>
      <div id="error-message" class="hidden p-6 bg-red-100 text-red-700 rounded-xl shadow text-center"></div>
      <div id="empty-message" class="hidden p-6 bg-yellow-100 text-yellow-800 rounded-xl shadow text-center">Nenhum produto disponível na planilha.</div>

      <section id="products-grid" class="hidden grid gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></section>

      <div id="checkout-area" class="hidden mt-8 bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-semibold mb-4">Checkout</h2>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <input id="customer-name" type="text" placeholder="Nome do cliente" class="border border-slate-300 rounded-lg px-4 py-2" />
          <input id="customer-phone" type="tel" placeholder="Telefone (ex: 79999999999)" class="border border-slate-300 rounded-lg px-4 py-2" />
          <select id="delivery-type" class="border border-slate-300 rounded-lg px-4 py-2">
            <option value="Entrega">Entrega</option>
            <option value="Retirada">Retirada</option>
          </select>
          <div id="address-wrapper" class="col-span-full">
            <input id="address" type="text" placeholder="Endereço de entrega" class="w-full border border-slate-300 rounded-lg px-4 py-2" />
          </div>
          <textarea id="notes" rows="3" placeholder="Observações" class="col-span-full border border-slate-300 rounded-lg px-4 py-2"></textarea>
        </div>
        <div class="mt-4 flex justify-between items-center gap-3">
          <button id="clear-cart" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">Limpar carrinho</button>
          <button id="finalize-order" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">Finalizar Pedido</button>
        </div>
        <p id="checkout-msg" class="mt-3 text-sm text-slate-600"></p>
      </div>
    </main>

    <div id="cart-panel" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50">
      <div class="px-4 py-4 border-b border-slate-200 flex justify-between items-center">
        <h3 class="text-lg font-semibold">Carrinho</h3>
        <button id="close-cart" class="text-slate-500 hover:text-slate-700">Fechar X</button>
      </div>
      <div class="p-4 overflow-y-auto h-[calc(100vh-160px)]">
        <ul id="cart-items" class="space-y-3"></ul>
      </div>
      <div class="p-4 border-t border-slate-200">
        <div class="flex justify-between text-lg font-semibold mb-3">
          <span>Total</span>
          <span id="total-value">R$ 0,00</span>
        </div>
        <p class="text-sm text-slate-500">Continue com o checkout abaixo para enviar para WhatsApp.</p>
      </div>
    </div>
    <div id="overlay" class="hidden fixed inset-0 bg-black/40 z-40"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
